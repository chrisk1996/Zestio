version: '3.8'

services:
  propertypix-frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: propertypix-pro
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3002
    labels:
      # Traefik configuration
      - "traefik.enable=true"
      - "traefik.http.routers.propertypix.rule=Host(`propertypix.srv1434875.hstgr.cloud`)"
      - "traefik.http.routers.propertypix.entrypoints=websecure"
      - "traefik.http.routers.propertypix.tls=true"
      - "traefik.http.routers.propertypix.tls.certresolver=letsencrypt"
      - "traefik.http.services.propertypix.loadbalancer.server.port=3002"
